name: Nightly IPL Data Refresh

on:
  schedule:
    # 7:30 PM UTC = 1:00 AM IST (IPL matches finish ~11 PM IST)
    - cron: '30 19 * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      retrain:
        description: 'Force model retrain?'
        required: false
        default: 'false'
        type: boolean

jobs:
  refresh:
    name: Refresh IPL Data
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run nightly refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MODEL_PATH: app/ml/models/xgb_win_predictor.joblib
          LABEL_ENCODERS_PATH: app/ml/models/label_encoders.joblib
        run: |
          if [ "${{ github.event.inputs.retrain }}" = "true" ]; then
            python scripts/nightly_refresh.py --retrain
          else
            python scripts/nightly_refresh.py
          fi

      - name: Upload refresh log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-log-${{ github.run_number }}
          path: backend/logs/nightly_refresh.log
          retention-days: 30
