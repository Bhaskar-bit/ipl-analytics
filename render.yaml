services:
  - type: web
    name: ipl-analytics-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MODEL_PATH
        value: app/ml/models/xgb_win_predictor.joblib
      - key: LABEL_ENCODERS_PATH
        value: app/ml/models/label_encoders.joblib
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
